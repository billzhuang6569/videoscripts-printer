<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>庄Sir的脚本打印器</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="/styles/app.css">
    <link rel="stylesheet" href="/styles/print.css" media="print">
  </head>
  <body>
    <div class="app-shell" data-app-shell>
      <header class="top-toolbar" aria-label="打印预览工具栏">
        <div class="brand-block">
          <h1>庄Sir的脚本打印器</h1>
          <p data-status-text>正在加载...</p>
        </div>

        <div class="toolbar-controls">
          <label class="toolbar-field">
            <span>数据</span>
            <select id="session-select" data-session-select></select>
          </label>

          <label class="toolbar-field">
            <span>模板</span>
            <select id="template-select" data-template-select></select>
          </label>

          <div class="segmented-control" role="group" aria-label="纸张方向">
            <button type="button" data-orientation-button="landscape">横向</button>
            <button type="button" data-orientation-button="portrait">纵向</button>
          </div>

          <button type="button" class="secondary-action" data-save-template>保存模板</button>
          <button type="button" class="primary-action" data-print>打印</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="settings-panel" aria-label="版式设置">
          <section class="settings-section">
            <div class="section-heading">
              <h2>表格</h2>
              <output data-row-height-output>96 px</output>
            </div>
            <label class="range-field">
              <span>行高</span>
              <input type="range" min="56" max="260" step="4" data-row-height-slider>
            </label>
            <div class="segmented-control row-height-mode-control" role="group" aria-label="行高模式">
              <button type="button" data-row-height-mode-button="fixed">固定</button>
              <button type="button" data-row-height-mode-button="auto">自动</button>
            </div>
          </section>

          <section class="settings-section warning-section" data-missing-warning hidden>
            <h2>缺失字段</h2>
            <p data-missing-warning-text></p>
          </section>

          <section class="settings-section organization-section">
            <div class="section-heading">
              <h2>组织</h2>
            </div>
            <label class="select-field">
              <span>分组</span>
              <select data-group-field aria-label="分组字段"></select>
            </label>
            <label class="select-field">
              <span>排序</span>
              <select data-sort-field aria-label="排序字段"></select>
            </label>
            <div class="segmented-control sort-direction-control" role="group" aria-label="排序方向">
              <button type="button" data-sort-direction-button="asc">升序</button>
              <button type="button" data-sort-direction-button="desc">降序</button>
            </div>
          </section>

          <section class="settings-section field-section">
            <div class="section-heading">
              <h2>字段</h2>
              <span data-field-count>0</span>
            </div>
            <div class="field-list" data-field-list></div>
          </section>
        </aside>

        <section class="preview-area" aria-label="A4 纸张预览">
          <div class="paper-frame">
            <div class="paper-sheet" data-paper-sheet>
              <div class="paper-meta">
                <span data-preview-title>未选择 session</span>
                <span data-preview-paper>A4</span>
              </div>
              <div class="print-surface" data-print-surface></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <dialog class="template-dialog" data-template-dialog aria-labelledby="template-dialog-title">
      <div class="template-dialog-panel">
        <div class="template-dialog-heading">
          <h2 id="template-dialog-title">保存模板</h2>
          <p>给当前排版起一个名字。</p>
        </div>
        <label class="template-name-field">
          <span>模板名称</span>
          <input type="text" data-template-name-input autocomplete="off">
        </label>
        <div class="template-dialog-actions">
          <button type="button" class="secondary-action" data-template-cancel>取消</button>
          <button type="button" class="primary-action" data-template-confirm>保存</button>
        </div>
      </div>
    </dialog>

    <div class="cell-editor" data-cell-editor hidden>
      <div class="cell-editor-panel">
        <div class="cell-editor-heading">
          <span data-cell-editor-title>编辑</span>
          <button type="button" data-cell-editor-close aria-label="关闭">×</button>
        </div>

        <div class="cell-text-editor" data-cell-text-editor>
          <textarea data-cell-editor-textarea spellcheck="false"></textarea>
        </div>

        <div class="cell-tag-editor" data-cell-tag-editor hidden>
          <div class="tag-editor-selected" data-tag-editor-selected></div>
          <input type="text" data-tag-editor-search placeholder="查找或创建选项" autocomplete="off">
          <div class="tag-editor-options" data-tag-editor-options></div>
        </div>

        <div class="cell-editor-actions">
          <button type="button" class="secondary-action" data-cell-editor-cancel>取消</button>
          <button type="button" class="primary-action" data-cell-editor-save>保存</button>
        </div>
      </div>
    </div>

    <script type="module" src="/js/app.js"></script>
  </body>
</html>
